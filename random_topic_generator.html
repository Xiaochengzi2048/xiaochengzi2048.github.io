<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记话题生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f0 0%, #ffecd2 50%, #fff0f6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(255, 160, 120, 0.15);
            text-align: center;
        }

        .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #3d2c2c;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #b08080;
            margin-bottom: 36px;
        }

        .result-area {
            min-height: 110px;
            background: linear-gradient(135deg, #fff8f5, #fff0fb);
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 28px;
            border: 1.5px solid #ffd6c8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #ffb5a0, #ffadd6);
            color: white;
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .topic-text {
            font-size: 16px;
            line-height: 1.75;
            color: #4a3030;
            font-weight: 400;
        }

        .placeholder {
            font-size: 14px;
            color: #d4a8a8;
        }

        .btn {
            background: linear-gradient(135deg, #ffb59a, #ff8fc8);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 20px rgba(255, 140, 180, 0.35);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 140, 180, 0.45);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .btn.spin .btn-icon {
            display: inline-block;
            animation: spin 0.4s ease;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #c4a0a0;
        }

        .result-area.pop {
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.97); opacity: 0.6; }
            60% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🌸</div>
        <h1>日记话题生成器</h1>
        <p class="subtitle">每天一个话题，让思绪自由流动</p>

        <div class="result-area" id="result-area">
            <p class="placeholder">点击下方按钮，抽取今日话题 ✨</p>
        </div>

        <button class="btn" id="generate">
            <span class="btn-icon">🎲</span> 抽取话题
        </button>

        <p class="footer">共收录多类话题 · 每次随机抽取</p>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('random_topic_generator/data.js');
            return await res.json();
        }

        function getRandomTopic(data) {
            const topic = data[Math.floor(Math.random() * data.length)];
            const area = document.getElementById('result-area');

            area.classList.remove('pop');
            void area.offsetWidth; // reflow to restart animation
            area.classList.add('pop');

            area.innerHTML = `
                <div class="tag">${topic.类型}</div>
                <p class="topic-text">${topic.话题}</p>
            `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData().then(data => {
                document.getElementById('generate').addEventListener('click', () => {
                    getRandomTopic(data);
                });
            });
        });
    </script>
</body>
</html>
