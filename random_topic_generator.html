<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记话题生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffeaa7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            padding: 28px 20px 12px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #5c3d2e;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 12px;
            color: #a07060;
            margin-top: 4px;
        }

        /* ─── Tabs ─── */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 0 20px 16px;
        }
        .tab-btn {
            flex: 1;
            max-width: 110px;
            padding: 8px 0;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.45);
            color: #a07060;
        }
        .tab-btn.active {
            background: #fff;
            color: #e07060;
            box-shadow: 0 2px 12px rgba(224,112,96,0.18);
        }

        /* ─── Sections ─── */
        .section { display: none; flex: 1; padding: 0 20px 100px; }
        .section.active { display: block; }

        /* ─── Topic Card ─── */
        .topic-card {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 4px 24px rgba(224,112,96,0.12);
            position: relative;
        }
        .topic-type {
            display: inline-block;
            background: linear-gradient(135deg, #ffb199, #ff8c7a);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .topic-text {
            font-size: 16px;
            line-height: 1.7;
            color: #4a3020;
            font-weight: 500;
        }
        .topic-empty {
            font-size: 14px;
            color: #b09080;
            text-align: center;
            padding: 10px 0;
        }
        .heart-btn {
            position: absolute;
            top: 16px;
            right: 18px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            transition: transform 0.15s;
        }
        .heart-btn:active { transform: scale(1.3); }

        /* ─── Daily Section ─── */
        .date-label {
            font-size: 13px;
            color: #a07060;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Calendar */
        .calendar-wrap {
            margin-top: 22px;
            background: rgba(255,255,255,0.7);
            border-radius: 18px;
            padding: 16px;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .cal-nav {
            background: none;
            border: none;
            font-size: 18px;
            color: #c07060;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .cal-nav:hover { background: rgba(224,112,96,0.1); }
        .cal-month {
            font-size: 14px;
            font-weight: 700;
            color: #5c3d2e;
        }
        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 6px;
        }
        .cal-weekdays span {
            font-size: 11px;
            color: #b09080;
            padding: 2px 0;
        }
        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 12px;
            color: #7a5a4a;
            cursor: default;
            position: relative;
            flex-direction: column;
        }
        .cal-day.empty { }
        .cal-day.future { color: #d0b8b0; }
        .cal-day.has-topic {
            cursor: pointer;
            background: rgba(255,180,160,0.15);
            transition: background 0.15s;
        }
        .cal-day.has-topic:hover { background: rgba(255,140,120,0.25); }
        .cal-day.today {
            background: linear-gradient(135deg, #ffb199, #ff8c7a) !important;
            color: white !important;
            font-weight: 700;
        }
        .cal-day .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ff8c7a;
            position: absolute;
            bottom: 3px;
        }
        .cal-day.today .dot { background: rgba(255,255,255,0.8); }

        /* Topic popup */
        .day-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .day-popup.show { display: flex; }
        .day-popup-inner {
            background: #fff8f5;
            border-radius: 24px 24px 0 0;
            padding: 24px 24px 40px;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .day-popup-date {
            font-size: 12px;
            color: #a07060;
            margin-bottom: 10px;
            text-align: center;
        }
        .day-popup-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 20px;
            color: #c09080;
            cursor: pointer;
        }

        /* ─── Random Section ─── */
        .filter-wrap {
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }
        .filter-chip {
            padding: 5px 13px;
            border-radius: 14px;
            font-size: 12px;
            border: 1.5px solid rgba(224,112,96,0.3);
            background: rgba(255,255,255,0.5);
            color: #a07060;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .filter-chip.active {
            background: linear-gradient(135deg, #ffb199, #ff8c7a);
            border-color: transparent;
            color: white;
        }
        .pull-btn {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ffb199, #ff8c7a);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 4px 16px rgba(255,140,120,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .pull-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255,140,120,0.2);
        }
        .hint {
            text-align: center;
            font-size: 11px;
            color: #b09080;
            margin-top: 10px;
        }

        /* ─── Favorites Section ─── */
        .fav-empty {
            text-align: center;
            color: #b09080;
            font-size: 14px;
            padding: 60px 0;
        }
        .fav-empty span { display: block; font-size: 36px; margin-bottom: 12px; }
        .fav-item {
            background: rgba(255,255,255,0.75);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 10px;
            position: relative;
        }
        .fav-item-type {
            font-size: 11px;
            color: #ff8c7a;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .fav-item-text {
            font-size: 14px;
            color: #4a3020;
            line-height: 1.6;
            padding-right: 28px;
        }
        .fav-item-date {
            font-size: 11px;
            color: #c0a090;
            margin-top: 6px;
        }
        .fav-remove {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 16px;
            color: #d0b0a0;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🌸 日记话题生成器</h1>
    <p>每天一个话题，让思绪自由流动</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('daily')">今日话题</button>
    <button class="tab-btn" onclick="switchTab('random')">随机抽取</button>
    <button class="tab-btn" onclick="switchTab('fav')">我的收藏</button>
</div>

<!-- ── 今日话题 ── -->
<div class="section active" id="sec-daily">
    <div class="date-label" id="today-label"></div>
    <div class="topic-card" id="daily-card">
        <div class="topic-type" id="daily-type"></div>
        <div class="topic-text" id="daily-text"></div>
        <button class="heart-btn" id="daily-heart" onclick="toggleFavDaily()">🤍</button>
    </div>
    <div class="calendar-wrap">
        <div class="cal-header">
            <button class="cal-nav" onclick="prevMonth()">‹</button>
            <div class="cal-month" id="cal-month-label"></div>
            <button class="cal-nav" onclick="nextMonth()">›</button>
        </div>
        <div class="cal-weekdays">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="cal-days" id="cal-days"></div>
    </div>
</div>

<!-- ── 随机抽取 ── -->
<div class="section" id="sec-random">
    <div class="filter-wrap" id="filter-chips"></div>
    <div class="topic-card" id="random-card">
        <div class="topic-type" id="random-type" style="display:none"></div>
        <div class="topic-text topic-empty" id="random-text">点击下方按钮，抽取今日话题 🎲</div>
        <button class="heart-btn" id="random-heart" onclick="toggleFavRandom()" style="display:none">🤍</button>
    </div>
    <button class="pull-btn" onclick="pullRandom()">🎲 抽取话题</button>
    <div class="hint">共收录 <span id="total-count"></span> 个话题 · 每次随机抽取</div>
</div>

<!-- ── 收藏 ── -->
<div class="section" id="sec-fav">
    <div id="fav-list"></div>
</div>

<!-- Day popup -->
<div class="day-popup" id="day-popup" onclick="closePopup(event)">
    <div class="day-popup-inner" style="position:relative">
        <button class="day-popup-close" onclick="closePopupBtn()">✕</button>
        <div class="day-popup-date" id="popup-date"></div>
        <div class="topic-card" style="box-shadow:none;background:transparent;padding:12px 0">
            <div class="topic-type" id="popup-type"></div>
            <div class="topic-text" id="popup-text"></div>
        </div>
    </div>
</div>

<script>
// ── Constants ──
const START_DATE = '2026-03-23';
const FAV_KEY = 'diary_topic_favs';

let allData = [];
let calYear, calMonth;
let currentRandomTopic = null;
let currentDailyTopic = null;
let selectedCategory = '全部';

// ── Init ──
async function init() {
    const res = await fetch('random_topic_generator/data.js');
    allData = await res.json();

    document.getElementById('total-count').textContent = allData.length;
    buildFilterChips();

    const today = new Date();
    calYear = today.getFullYear();
    calMonth = today.getMonth();

    renderDaily();
    renderCalendar();
}

// ── Date helpers ──
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateToStr(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getDayIndex(dateStr) {
    const start = new Date(START_DATE + 'T00:00:00');
    const target = new Date(dateStr + 'T00:00:00');
    return Math.floor((target - start) / 86400000);
}

function getTopicForDate(dateStr) {
    const idx = getDayIndex(dateStr);
    if (idx < 0 || allData.length === 0) return null;
    return allData[idx % allData.length];
}

function fmtDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

// ── Tab switching ──
function switchTab(tab) {
    ['daily','random','fav'].forEach(t => {
        document.getElementById('sec-'+t).classList.toggle('active', t === tab);
    });
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ['daily','random','fav'][i] === tab);
    });
    if (tab === 'fav') renderFavList();
}

// ── Daily ──
function renderDaily() {
    const today = todayStr();
    const [y, m, d] = today.split('-');
    document.getElementById('today-label').textContent =
        `${y}年${parseInt(m)}月${parseInt(d)}日 · 今日话题`;

    const topic = getTopicForDate(today);
    currentDailyTopic = topic;
    if (topic) {
        document.getElementById('daily-type').textContent = topic['类型'];
        document.getElementById('daily-text').textContent = topic['话题'];
        document.getElementById('daily-heart').style.display = 'block';
        updateDailyHeart();
    }
}

function toggleFavDaily() {
    if (!currentDailyTopic) return;
    const today = todayStr();
    toggleFav({ ...currentDailyTopic, savedDate: today });
    updateDailyHeart();
}

function updateDailyHeart() {
    const topic = currentDailyTopic;
    if (!topic) return;
    const favs = getFavs();
    const saved = favs.some(f => f['话题'] === topic['话题']);
    document.getElementById('daily-heart').textContent = saved ? '❤️' : '🤍';
}

// ── Calendar ──
function renderCalendar() {
    const label = `${calYear}年${calMonth+1}月`;
    document.getElementById('cal-month-label').textContent = label;

    const today = todayStr();
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

    const grid = document.getElementById('cal-days');
    grid.innerHTML = '';

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day empty';
        grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = dateToStr(calYear, calMonth, d);
        const dayIdx = getDayIndex(dateStr);
        const el = document.createElement('div');
        el.className = 'cal-day';
        el.textContent = d;

        if (dateStr === today) {
            el.classList.add('today', 'has-topic');
            const dot = document.createElement('div');
            dot.className = 'dot';
            el.appendChild(dot);
            el.onclick = () => showDayPopup(dateStr);
        } else if (dayIdx >= 0 && dateStr < today) {
            el.classList.add('has-topic');
            const dot = document.createElement('div');
            dot.className = 'dot';
            el.appendChild(dot);
            el.onclick = () => showDayPopup(dateStr);
        } else if (dateStr > today) {
            el.classList.add('future');
        }

        grid.appendChild(el);
    }
}

function prevMonth() {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
}
function nextMonth() {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
}

function showDayPopup(dateStr) {
    const topic = getTopicForDate(dateStr);
    if (!topic) return;
    document.getElementById('popup-date').textContent = fmtDate(dateStr);
    document.getElementById('popup-type').textContent = topic['类型'];
    document.getElementById('popup-text').textContent = topic['话题'];
    document.getElementById('day-popup').classList.add('show');
}

function closePopup(e) {
    if (e.target === document.getElementById('day-popup')) closePopupBtn();
}
function closePopupBtn() {
    document.getElementById('day-popup').classList.remove('show');
}

// ── Random ──
function buildFilterChips() {
    const types = ['全部', ...new Set(allData.map(d => d['类型']))];
    const wrap = document.getElementById('filter-chips');
    wrap.innerHTML = '';
    types.forEach(t => {
        const chip = document.createElement('div');
        chip.className = 'filter-chip' + (t === '全部' ? ' active' : '');
        chip.textContent = t;
        chip.onclick = () => selectCategory(t, chip);
        wrap.appendChild(chip);
    });
}

function selectCategory(cat, el) {
    selectedCategory = cat;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function pullRandom() {
    const pool = selectedCategory === '全部'
        ? allData
        : allData.filter(d => d['类型'] === selectedCategory);
    if (!pool.length) return;

    const card = document.getElementById('random-card');
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = 'popIn 0.25s ease';

    const topic = pool[Math.floor(Math.random() * pool.length)];
    currentRandomTopic = topic;

    document.getElementById('random-type').textContent = topic['类型'];
    document.getElementById('random-type').style.display = 'inline-block';
    document.getElementById('random-text').textContent = topic['话题'];
    document.getElementById('random-text').className = 'topic-text';
    document.getElementById('random-heart').style.display = 'block';
    updateRandomHeart();
}

function toggleFavRandom() {
    if (!currentRandomTopic) return;
    toggleFav({ ...currentRandomTopic, savedDate: todayStr() });
    updateRandomHeart();
}

function updateRandomHeart() {
    const topic = currentRandomTopic;
    if (!topic) return;
    const favs = getFavs();
    const saved = favs.some(f => f['话题'] === topic['话题']);
    document.getElementById('random-heart').textContent = saved ? '❤️' : '🤍';
}

// ── Favorites ──
function getFavs() {
    return JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
}

function toggleFav(topic) {
    let favs = getFavs();
    const idx = favs.findIndex(f => f['话题'] === topic['话题']);
    if (idx >= 0) {
        favs.splice(idx, 1);
    } else {
        favs.unshift(topic);
    }
    localStorage.setItem(FAV_KEY, JSON.stringify(favs));
}

function removeFav(topicText) {
    let favs = getFavs().filter(f => f['话题'] !== topicText);
    localStorage.setItem(FAV_KEY, JSON.stringify(favs));
    renderFavList();
    updateDailyHeart();
    updateRandomHeart();
}

function renderFavList() {
    const favs = getFavs();
    const el = document.getElementById('fav-list');
    if (!favs.length) {
        el.innerHTML = `<div class="fav-empty"><span>🤍</span>还没有收藏的话题<br>点击话题卡片上的心形按钮来收藏</div>`;
        return;
    }
    el.innerHTML = favs.map(f => `
        <div class="fav-item">
            <div class="fav-item-type">${f['类型']}</div>
            <div class="fav-item-text">${f['话题']}</div>
            <div class="fav-item-date">${f.savedDate ? fmtDate(f.savedDate) + ' 收藏' : ''}</div>
            <button class="fav-remove" onclick="removeFav('${f['话题'].replace(/'/g,"\\'")}')">✕</button>
        </div>
    `).join('');
}

// ── Animation ──
const style = document.createElement('style');
style.textContent = `@keyframes popIn { from { transform: scale(0.96); opacity:0.7; } to { transform: scale(1); opacity:1; } }`;
document.head.appendChild(style);

init();
</script>
</body>
</html>
