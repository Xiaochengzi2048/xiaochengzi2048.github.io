<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0}body{background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}</style>
</head><body>
<canvas id="cv" width="520" height="360"></canvas>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const TW=24,TH=24,W=520,H=360;

// Gather Town warm palette
const PAL={
  void:'#1a1e2a',
  wall:'#3a2e24',wallDark:'#2a2018',wallLight:'#4a3c30',
  wood:'#c8a060',woodAlt:'#bc9858',woodDark:'#a07840',
  carpet_b:'#3a5a9c',carpet_b2:'#324e8a',  // blue - Hall B
  carpet_a:'#3a7c48',carpet_a2:'#326840',  // green - Hall A
  carpet_c:'#9c5a30',carpet_c2:'#8a4e28',  // orange - Hall C
  stone:'#7a7468',stoneAlt:'#706a60',
  carpet_lob:'#6a4a9c',carpet_lob2:'#5e4088', // purple - lobby
  carpet_ex:'#4a6878',carpet_ex2:'#405e6c',   // teal - exhibition
  table:'#8a6030',tableDark:'#6a4820',tableLight:'#a07840',
  chair_a:'#2a6040',chair_b:'#2a4080',chair_c:'#804020',
  plant_pot:'#7a4c20',plant_leaf:'#2a8a20',plant_dark:'#1e6818',
  screen:'#1a2860',screenGlow:'#4a8ae0',
  stage_a:'#2a5c34',stage_b:'#1e3870',stage_c:'#703018',
  rug_b:'#2040a0',rug_b2:'#1a3490',
};

// Map grid
const _=0,A=1,B=2,C=3,CO=4,LB=5,EX=6,EN=7,WL=8;
const MAP=[
  [WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,_],
  [WL, A, A, A, A,WL, B, B, B, B,WL, C, C, C, C,WL, _, _, _, _,_],
  [WL, A, A, A, A,WL, B, B, B, B,WL, C, C, C, C,WL, _, _, _, _,_],
  [WL, A, A, A, A,WL, B, B, B, B,WL, C, C, C, C,WL, _, _, _, _,_],
  [WL, A, A, A, A,WL, B, B, B, B,WL, C, C, C, C,WL, _, _, _, _,_],
  [WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL, _, _, _, _,_],
  [CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO, _, _, _, _,_],
  [WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL, _, _, _, _,_],
  [WL,LB,LB,LB,WL,WL,EX,EX,EX,EX,EX,EX,WL,WL,EN,EN,EN,WL, _, _,_],
  [WL,LB,LB,LB,WL,WL,EX,EX,EX,EX,EX,EX,WL,WL,EN,EN,EN,WL, _, _,_],
  [WL,LB,LB,LB,WL,WL,EX,EX,EX,EX,EX,EX,WL,WL,EN,EN,EN,WL, _, _,_],
  [WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL, _, _,_],
  [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
];

function tile(x,y,c1,c2,r){
  ctx.fillStyle=(r%2===0)?c1:c2;
  ctx.fillRect(x,y,TW,TH);
}

function drawFloor(){
  ctx.fillStyle=PAL.void;ctx.fillRect(0,0,W,H);
  for(let r=0;r<MAP.length;r++)for(let c=0;c<MAP[r].length;c++){
    const z=MAP[r][c],x=c*TW,y=r*TH,alt=(r+c)%2;
    if(z===_)continue;
    if(z===WL){
      ctx.fillStyle=PAL.wall;ctx.fillRect(x,y,TW,TH);
      ctx.fillStyle=PAL.wallDark;ctx.fillRect(x+1,y+1,TW-2,TH-2);
      ctx.fillStyle=PAL.wallLight;ctx.fillRect(x,y,TW,2);ctx.fillRect(x,y,2,TH);
    } else if(z===A) tile(x,y,PAL.carpet_a,PAL.carpet_a2,alt);
    else if(z===B) tile(x,y,PAL.carpet_b,PAL.carpet_b2,alt);
    else if(z===C) tile(x,y,PAL.carpet_c,PAL.carpet_c2,alt);
    else if(z===CO){
      // Wood planks - horizontal stripes
      ctx.fillStyle=(r%2===0)?PAL.wood:PAL.woodAlt;ctx.fillRect(x,y,TW,TH);
      ctx.fillStyle=PAL.woodDark;ctx.fillRect(x,y+TH-2,TW,1);
    }
    else if(z===LB) tile(x,y,PAL.carpet_lob,PAL.carpet_lob2,alt);
    else if(z===EX) tile(x,y,PAL.carpet_ex,PAL.carpet_ex2,alt);
    else if(z===EN){
      ctx.fillStyle=(alt)?PAL.stone:PAL.stoneAlt;ctx.fillRect(x,y,TW,TH);
      ctx.fillStyle='rgba(0,0,0,.1)';ctx.fillRect(x,y+TH-1,TW,1);ctx.fillRect(x+TW-1,y,1,TH);
    }
  }
}

function drawFurnitureHall(sc,zone){
  // sc = start col of this hall (1,6,11)
  const x0=sc*TW,y0=1*TH;
  const stageC=zone===A?PAL.stage_a:zone===B?PAL.stage_b:PAL.stage_c;
  const chairC=zone===A?PAL.chair_a:zone===B?PAL.chair_b:PAL.chair_c;
  const screenC=zone===B?PAL.screenGlow:zone===A?'#3a8a50':'#d06030';

  // Stage platform (back of hall = row 4-5, full width)
  ctx.fillStyle=stageC;ctx.fillRect(x0+2,4*TH+2,4*TW-4,TH+TH-4);
  ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(x0+2,4*TH+2,4*TW-4,3);
  
  // Podium
  ctx.fillStyle=PAL.table;ctx.fillRect(x0+TW+TW/2,4*TH+6,TW-4,TH-8);
  ctx.fillStyle=PAL.tableLight;ctx.fillRect(x0+TW+TW/2,4*TH+6,TW-4,4);

  // Screen on stage back wall
  ctx.fillStyle=PAL.screen;ctx.fillRect(x0+4,4*TH+4,3*TW-8,TH-8+TH/2);
  ctx.fillStyle=screenC+'80';ctx.fillRect(x0+6,4*TH+6,3*TW-12,TH-10+TH/2-2);
  if(zone===B){ctx.shadowColor='#4e9bff';ctx.shadowBlur=8;}
  ctx.fillStyle=screenC+'50';ctx.fillRect(x0+6,4*TH+6,3*TW-12,TH-10+TH/2-2);
  ctx.shadowBlur=0;

  // Seat rows (2 rows × 3 seats)
  for(let row=0;row<2;row++){
    for(let s=0;s<3;s++){
      const sx=x0+4+s*TW+s*2;
      const sy=2*TH+4+row*(TH-2);
      // Chair
      ctx.fillStyle=chairC;ctx.fillRect(sx,sy,TW-6,TH-8);
      ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(sx,sy,TW-6,3);
      // Seated person dot
      if(zone===B||(s+row)%2===0){
        ctx.fillStyle=zone===B?'#90c0ff':'rgba(255,255,255,.4)';
        ctx.beginPath();ctx.arc(sx+(TW-6)/2,sy+5,4,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Plants (corners of hall)
  [[x0+3,1*TH+3],[x0+4*TW-6,1*TH+3]].forEach(([px,py])=>{
    ctx.fillStyle=PAL.plant_pot;ctx.fillRect(px,py+6,8,6);
    ctx.fillStyle=PAL.plant_dark;ctx.beginPath();ctx.arc(px+4,py+4,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=PAL.plant_leaf;ctx.beginPath();ctx.arc(px+4,py+3,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+1,py+5,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+7,py+5,3,0,Math.PI*2);ctx.fill();
  });

  // Rug under seats (Hall B only)
  if(zone===B){
    ctx.fillStyle=PAL.rug_b+'80';
    ctx.fillRect(x0+2,2*TH,4*TW-4,2*TH);
    ctx.strokeStyle=PAL.rug_b2;ctx.lineWidth=1;
    ctx.strokeRect(x0+3,2*TH+1,4*TW-6,2*TH-2);
  }
}

function drawExhibitionBooths(){
  // 3 booths
  [[6,8],[8,9],[10,8]].forEach(([c,r],i)=>{
    const x=c*TW+1,y=r*TH+2;
    const clr=['#2a4a8a','#1e6030','#7a3018'][i];
    const lit=['#60a0ff','#60d080','#ff8050'][i];
    // Table
    ctx.fillStyle=PAL.table;ctx.fillRect(x,y,TW*1.5,TH-4);
    ctx.fillStyle=PAL.tableLight;ctx.fillRect(x,y,TW*1.5,4);
    // Screen on table
    ctx.fillStyle=clr;ctx.fillRect(x+3,y+4,TW-4,TH-10);
    ctx.fillStyle=lit+'60';ctx.fillRect(x+4,y+5,TW-6,TH-12);
    // Person behind booth
    ctx.fillStyle=lit+'cc';ctx.beginPath();ctx.arc(x+TW*0.75,y+TH+4,4,0,Math.PI*2);ctx.fill();
  });
}

function drawLobby(){
  const x=1*TW,y=8*TH;
  // Reception desk
  ctx.fillStyle=PAL.table;ctx.fillRect(x+2,y+2,3*TW-4,TH/2);
  ctx.fillStyle=PAL.tableLight;ctx.fillRect(x+2,y+2,3*TW-4,4);
  // Sofa (bottom)
  ctx.fillStyle='#5a3a80';ctx.fillRect(x+2,y+TH+6,3*TW-4,TH-8);
  ctx.fillStyle='#6a4a90';ctx.fillRect(x+2,y+TH+6,3*TW-4,4);
  // Plant
  ctx.fillStyle=PAL.plant_pot;ctx.fillRect(x+TW*1.2,y+TH*2.1,7,5);
  ctx.fillStyle=PAL.plant_dark;ctx.beginPath();ctx.arc(x+TW*1.2+3,y+TH*2.1,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=PAL.plant_leaf;ctx.beginPath();ctx.arc(x+TW*1.2+3,y+TH*2.1-1,3,0,Math.PI*2);ctx.fill();
}

function drawEntrance(){
  const x=14*TW,y=8*TH;
  // QR stand
  ctx.fillStyle='#2a3a50';ctx.fillRect(x+TW,y+4,TW-4,TH*2-8);
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(x+TW,y+4,TW-4,4);
  // QR pixels
  ctx.fillStyle='#80c0ff';
  const qd=4,qx=x+TW+4,qy=y+8;
  [[0,0],[1,0],[2,0],[0,1],[2,1],[0,2],[1,2],[2,2],[4,0],[5,0],[4,2],[5,2],[4,1],[3,3],[5,3],[3,4],[4,4],[5,4]].forEach(([a,b])=>{
    ctx.fillRect(qx+a*qd,qy+b*qd,qd-1,qd-1);
  });
  // Welcome mat
  ctx.fillStyle='#3a5a4a';ctx.fillRect(x+2,y+TH*2+2,3*TW-4,6);
  ctx.fillStyle='#4a7a5a';ctx.fillRect(x+4,y+TH*2+3,3*TW-8,2);
}

function drawLabels(hlB){
  ctx.textAlign='center';
  // Hall signs (pixel font style)
  function hallSign(cx,cy,text,sub,clr,glow){
    if(glow){ctx.shadowColor=clr;ctx.shadowBlur=8;}
    // Sign board
    ctx.fillStyle=glow?'#1a2a50':'#2a2018';
    ctx.beginPath();ctx.roundRect(cx-28,cy-11,56,22,4);ctx.fill();
    ctx.strokeStyle=clr;ctx.lineWidth=glow?2:1;
    ctx.beginPath();ctx.roundRect(cx-28,cy-11,56,22,4);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font='bold 8px monospace';ctx.fillStyle=clr;ctx.fillText(text,cx,cy+2);
    ctx.font='6px monospace';ctx.fillStyle=clr+'99';ctx.fillText(sub,cx,cy+11);
  }
  hallSign(3*TW,0.5*TH,'HALL A','基础技术',PAL.plant_leaf,false);
  hallSign(8.5*TW,0.5*TH,hlB?'HALL B ★':'HALL B',hlB?'★ 推荐 · 跨端开发':'跨端开发',PAL.screenGlow,hlB);
  hallSign(13.5*TW,0.5*TH,'HALL C','生态合作','#e07828',false);

  // Corridor floor text
  ctx.font='6px monospace';ctx.fillStyle='rgba(200,160,96,.35)';
  ctx.fillText('◀─────── 通道 ───────▶',8*TW,6*TH+TH/2+3);

  // Bottom zone labels
  ctx.font='6px monospace';
  ctx.fillStyle='rgba(160,120,220,.6)';ctx.fillText('大厅',2.5*TW,11*TH-4);
  ctx.fillStyle='rgba(100,160,180,.6)';ctx.fillText('展览区',9*TW,11*TH-4);
  ctx.fillStyle='rgba(140,160,180,.6)';ctx.fillText('↑ 入口',15.5*TW,11*TH-4);
}

function drawMap(hlB){
  drawFloor();
  drawFurnitureHall(1,A);
  drawFurnitureHall(6,B);
  drawFurnitureHall(11,C);
  drawExhibitionBooths();
  drawLobby();
  drawEntrance();
  drawLabels(hlB);
  // Hall borders
  ctx.lineWidth=1.5;
  ctx.strokeStyle='#3a6a40';ctx.strokeRect(1*TW+.5,1*TH+.5,4*TW-1,5*TH-1);
  if(hlB){ctx.strokeStyle='#5090ff';ctx.shadowColor='#4e9bff';ctx.shadowBlur=12;}
  else ctx.strokeStyle='#2a4a90';
  ctx.strokeRect(6*TW+.5,1*TH+.5,4*TW-1,5*TH-1);
  ctx.shadowBlur=0;
  ctx.strokeStyle='#7a4a20';ctx.strokeRect(11*TW+.5,1*TH+.5,4*TW-1,5*TH-1);
}

drawMap(true);
</script>
</body></html>
